
[modules]
left = [ [ "Workspaces" ], ["MediaPlayer"] ]
center = [ "WindowTitle" ]
right = [ "SystemInfo", "Privacy", [  "Tray" ], [ "Settings", "Tempo" ] ]

[system_info]
indicators = [ "Cpu", "Memory" ]
interval = 5

[appearance]
opacity = 0.9

# Main accent / primary color (Gruvbox Orange - very characteristic)
primary_color = "#fe8019"

# Success / positive color (Gruvbox Green)
success_color = "#b8bb26"

# Main text color (Gruvbox Light Beige / Foreground)
text_color = "#ebdbb2"

workspace_colors = ["#fe8019", "#b8bb26", "#83a598", "#d3869b"]

# Danger / error color
[appearance.danger_color]
base = "#fb4934"   # Gruvbox Bright Red
weak = "#d65d0e"   # Gruvbox Orange (for warnings)

# Background colors
[appearance.background_color]
base   = "#1d2021"   # Hard dark background
weak   = "#282828"   # Slightly lighter bg (common for bars)
strong = "#3c3836"   # Dark gray for contrast / borders

# Secondary color (used for subtle elements, inactive states, etc.)
[appearance.secondary_color]
base = "#32302f"
